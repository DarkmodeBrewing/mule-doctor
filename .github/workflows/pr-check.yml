name: PR Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck + Lint + Test
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Checks
        run: npm run check

  smoke-docker:
    name: Docker Smoke
    runs-on: ubuntu-latest
    needs: check
    if: github.event.pull_request.draft == false
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Docker Smoke Harness
        env:
          SMOKE_KEEP_WORK_DIR_ON_FAILURE: "true"
          SMOKE_KEEP_WORK_DIR_ON_SUCCESS: "false"
        run: npm run smoke:docker

      - name: Upload Smoke Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-smoke-artifacts
          path: /tmp/mule-doctor-smoke.*
          if-no-files-found: ignore
