name: Docker Smoke

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Docker Smoke Validation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Show Docker Versions
        run: |
          docker version
          docker compose version

      - name: Run Docker Smoke Validation
        run: npm run smoke:docker

      - name: Upload Smoke Artifacts On Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-smoke-artifacts
          path: /tmp/mule-doctor-smoke.*
          if-no-files-found: ignore
          retention-days: 7
