name: Docker Build

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      COMPOSE_PROJECT_NAME: mule_doctor_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Show Docker Versions
        run: |
          docker version
          docker compose version

      - name: Render Compose Config
        run: docker compose config

      - name: Build Docker Image Through Compose
        run: docker compose build --pull

      - name: Capture Built Image Reference
        id: image
        run: |
          image_ref="${COMPOSE_PROJECT_NAME}-mule-doctor"
          image_id="$(docker image inspect --format '{{ .Id }}' "$image_ref" 2>/dev/null || true)"
          if [ -z "$image_id" ]; then
            echo "failed to resolve built mule-doctor image: $image_ref" >&2
            exit 1
          fi
          echo "image_ref=$image_ref" >>"$GITHUB_OUTPUT"
          echo "image_id=$image_id" >>"$GITHUB_OUTPUT"

      - name: Validate Runtime Image Layout
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
        run: |
          docker run --rm --entrypoint bash "$IMAGE_REF" -lc '
            set -euo pipefail

            test -x /entrypoint.sh
            test -d /app/dist
            test -f /app/package.json
            test -x /app/scripts/container-healthcheck.sh
            test -d /opt/rust-mule
            test -x /opt/rust-mule/target/release/rust-mule
            test -d /data
            test -d /data/logs
            test -d /data/mule-doctor

            [ "$NODE_ENV" = "production" ]
            [ "$RUST_MULE_API_URL" = "http://127.0.0.1:17835" ]
            [ "$RUST_MULE_TOKEN_PATH" = "/data/token" ]
            [ "$RUST_MULE_LOG_PATH" = "/data/logs/rust-mule.log" ]
            [ "$RUST_MULE_SOURCE_PATH" = "/opt/rust-mule" ]
            [ "$MULE_DOCTOR_DATA_DIR" = "/data/mule-doctor" ]
            [ "$MULE_DOCTOR_STATE_PATH" = "/data/mule-doctor/state.json" ]
            [ "$MULE_DOCTOR_HISTORY_PATH" = "/data/mule-doctor/history.json" ]
            [ "$MULE_DOCTOR_LLM_LOG_DIR" = "/data/mule-doctor" ]
            [ "$MULE_DOCTOR_UI_ENABLED" = "false" ]
            [ "$MULE_DOCTOR_UI_HOST" = "127.0.0.1" ]
            [ "$MULE_DOCTOR_UI_PORT" = "18080" ]
          '

      - name: Validate Docker Image Metadata
        env:
          IMAGE_ID: ${{ steps.image.outputs.image_id }}
        run: |
          workdir="$(docker image inspect "$IMAGE_ID" --format '{{ .Config.WorkingDir }}')"
          user="$(docker image inspect "$IMAGE_ID" --format '{{ .Config.User }}')"
          cmd="$(docker image inspect "$IMAGE_ID" --format '{{ json .Config.Cmd }}')"
          healthcheck="$(docker image inspect "$IMAGE_ID" --format '{{ json .Config.Healthcheck.Test }}')"

          [ "$workdir" = "/app" ]
          [ "$user" = "mule" ]
          [ "$cmd" = '["/entrypoint.sh"]' ]
          [ "$healthcheck" = '["CMD","/app/scripts/container-healthcheck.sh"]' ]
