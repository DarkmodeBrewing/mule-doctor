services:
  mule-doctor:
    container_name: mule-doctor
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RUST_MULE_REPO: ${RUST_MULE_REPO:-https://github.com/DarkmodeBrewing/rust-mule.git}
        RUST_MULE_REF: ${RUST_MULE_REF:-main}
    restart: unless-stopped
    ports:
      - "17835:17835"
      - "${MULE_DOCTOR_UI_PORT:-18080}:${MULE_DOCTOR_UI_PORT:-18080}"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MATTERMOST_WEBHOOK_URL: ${MATTERMOST_WEBHOOK_URL}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      OBSERVE_INTERVAL_MS: ${OBSERVE_INTERVAL_MS:-300000}
      RUST_MULE_API_URL: ${RUST_MULE_API_URL:-http://127.0.0.1:17835}
      RUST_MULE_API_PREFIX: ${RUST_MULE_API_PREFIX:-/api/v1}
      RUST_MULE_LOG_PATH: ${RUST_MULE_LOG_PATH:-/data/logs/rust-mule.log}
      RUST_MULE_TOKEN_PATH: ${RUST_MULE_TOKEN_PATH:-/data/token}
      RUST_MULE_DEBUG_TOKEN_FILE: ${RUST_MULE_DEBUG_TOKEN_FILE:-/data/debug.token}
      RUST_MULE_SOURCE_PATH: ${RUST_MULE_SOURCE_PATH:-/opt/rust-mule}
      RUST_MULE_CONFIG: ${RUST_MULE_CONFIG:-/data/config.toml}
      TOKEN_WAIT_TIMEOUT_SEC: ${TOKEN_WAIT_TIMEOUT_SEC:-120}
      MULE_DOCTOR_DATA_DIR: ${MULE_DOCTOR_DATA_DIR:-/data/mule-doctor}
      MULE_DOCTOR_STATE_PATH: ${MULE_DOCTOR_STATE_PATH:-/data/mule-doctor/state.json}
      MULE_DOCTOR_HISTORY_PATH: ${MULE_DOCTOR_HISTORY_PATH:-/data/mule-doctor/history.json}
      MULE_DOCTOR_HISTORY_LIMIT: ${MULE_DOCTOR_HISTORY_LIMIT:-500}
      MULE_DOCTOR_LLM_LOG_DIR: ${MULE_DOCTOR_LLM_LOG_DIR:-/data/mule-doctor}
      OPENAI_INPUT_COST_PER_1K: ${OPENAI_INPUT_COST_PER_1K:-0}
      OPENAI_OUTPUT_COST_PER_1K: ${OPENAI_OUTPUT_COST_PER_1K:-0}
      MULE_DOCTOR_UI_ENABLED: ${MULE_DOCTOR_UI_ENABLED:-false}
      MULE_DOCTOR_UI_HOST: ${MULE_DOCTOR_UI_HOST:-0.0.0.0}
      MULE_DOCTOR_UI_PORT: ${MULE_DOCTOR_UI_PORT:-18080}
      MULE_DOCTOR_UI_LOG_BUFFER_LINES: ${MULE_DOCTOR_UI_LOG_BUFFER_LINES:-2000}
    volumes:
      - ./data:/data
